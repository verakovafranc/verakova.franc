<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vira Faith</title>
    <link rel="canonical" href="https://vira.faith/">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <!-- Header -->
    <header class="site-header">
        <div class="logo">
            <a href="/">Vira Faith</a>
        </div>
        <nav class="site-nav">
            <a href="#work" class="nav-link nav-work active">WORK</a>
            <a href="#info" class="nav-link nav-info">INFO</a>
        </nav>
    </header>

    <!-- Work Section -->
    <main id="work" class="portfolio-grid">

        <a href="#" class="grid-item">
            <img src="public/images/ballerina1.JPEG" alt="Ballerina">
            <div class="overlay">
                <span class="overlay-text">Ballerina</span>
            </div>
        </a>

        <a href="#" class="grid-item">
            <img src="public/images/bella1.png" alt="Bella">
            <div class="overlay">
                <span class="overlay-text">Bella</span>
            </div>
        </a>

        <a href="#" class="grid-item">
            <img src="public/images/bersicker1.jpg" alt="Bersicker">
            <div class="overlay">
                <span class="overlay-text">Bersicker</span>
            </div>
        </a>

        <a href="#" class="grid-item">
            <img src="public/images/kytka1.jpg" alt="Kytka">
            <div class="overlay">
                <span class="overlay-text">Kytka</span>
            </div>
        </a>

        <a href="#" class="grid-item">
            <img src="public/images/nana1.jpg" alt="Nana">
            <div class="overlay">
                <span class="overlay-text">Nana</span>
            </div>
        </a>

        <a href="#" class="grid-item">
            <img src="public/images/new_york1.jpg" alt="New York">
            <div class="overlay">
                <span class="overlay-text">New York</span>
            </div>
        </a>

        <a href="#" class="grid-item">
            <img src="public/images/rachel1.jpg" alt="Rachel">
            <div class="overlay">
                <span class="overlay-text">Rachel</span>
            </div>
        </a>

        <a href="#" class="grid-item">
            <img src="public/images/red_hill1.png" alt="Red Hill">
            <div class="overlay">
                <span class="overlay-text">Red Hill</span>
            </div>
        </a>

        <a href="#" class="grid-item">
            <img src="public/images/rollercoaster1.JPEG" alt="Rollercoaster">
            <div class="overlay">
                <span class="overlay-text">Rollercoaster</span>
            </div>
        </a>

        <a href="#" class="grid-item">
            <img src="public/images/siren_sailor1.JPEG" alt="Siren Sailor">
            <div class="overlay">
                <span class="overlay-text">Siren Sailor</span>
            </div>
        </a>

        <a href="#" class="grid-item">
            <img src="public/images/sleep1.jpg" alt="Sleep">
            <div class="overlay">
                <span class="overlay-text">Sleep</span>
            </div>
        </a>

        <a href="#" class="grid-item">
            <img src="public/images/tortured_artist1.png" alt="Tortured Artist">
            <div class="overlay">
                <span class="overlay-text">Tortured Artist</span>
            </div>
        </a>

        <a href="#" class="grid-item">
            <img src="public/images/yana1.JPG" alt="Yana">
            <div class="overlay">
                <span class="overlay-text">Yana</span>
            </div>
        </a>

    </main>

    <!-- Info Section (hidden by default) -->
    <section id="info" class="info-section hidden">
        <div class="info-content">
            <h2>About</h2>
            <p>Photographer &amp; Visual Artist</p>
            <p>Contact: <a href="mailto:hello@vira.faith">hello@vira.faith</a></p>
        </div>
    </section>

    <script src="index.js"></script>
</body>
</html>
